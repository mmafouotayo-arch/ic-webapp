# ============================================================
# odoo/postgres/pvc.yaml
# Volume persistant pour la base de données PostgreSQL
# Ressource F dans l'architecture
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: icgroup
  labels:
    app: postgres
    env: prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# ============================================================
# odoo/postgres/deployment.yaml
# Déploiement PostgreSQL pour Odoo
# Ressource F dans l'architecture
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: icgroup
  labels:
    app: postgres
    env: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        env: prod
    spec:
      containers:
        - name: postgres
          image: postgres:13
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: icgroup-secret
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: icgroup-secret
                  key: postgres-password
            - name: POSTGRES_DB
              value: "odoo"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
# ============================================================
# odoo/postgres/service.yaml
# Service ClusterIP (interne) pour PostgreSQL
# Ressource E dans l'architecture
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: icgroup
  labels:
    app: postgres
    env: prod
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
