# ============================================================
# secret.yaml
# Stockage sécurisé des informations sensibles
# Les valeurs sont encodées en base64
# Pour encoder : echo -n "valeur" | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: icgroup-secret
  namespace: icgroup
  labels:
    env: prod
type: Opaque
data:
  # echo -n "odoo" | base64  =>  b2Rvbw==
  postgres-user: b2Rvbw==
  # echo -n "odoo_password" | base64  =>  b2Rvb19wYXNzd29yZA==
  postgres-password: b2Rvb19wYXNzd29yZA==
  # echo -n "admin@icgroup.com" | base64  =>  YWRtaW5AaWNncm91cC5jb20=
  pgadmin-email: YWRtaW5AaWNncm91cC5jb20=
  # echo -n "pgadmin_password" | base64  =>  cGdhZG1pbl9wYXNzd29yZA==
  pgadmin-password: cGdhZG1pbl9wYXNzd29yZA==
