# ============================================================
# roles/odoo_role/vars/main.yml
# Variables du rôle Odoo - modifiables selon l'environnement
# ============================================================

# Nom du container Odoo
odoo_container_name: "odoo"

# Nom du container PostgreSQL
postgres_container_name: "postgres"

# Nom du réseau Docker
odoo_network_name: "odoo_network"

# Nom du volume Docker pour PostgreSQL
postgres_volume_name: "postgres_data"

# Répertoire local de montage des données Odoo
odoo_data_dir: "/opt/odoo/data"

# Nom du service dans docker-compose
odoo_service_name: "odoo"
postgres_service_name: "postgres"

# Identifiants base de données
postgres_user: "odoo"
postgres_password: "odoo_password"
postgres_db: "odoo"

# Ports
odoo_port: "8069"
postgres_port: "5432"

# Version image Odoo
odoo_image: "odoo:13.0"
postgres_image: "postgres:13"
